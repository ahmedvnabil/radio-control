<!doctype html>
<html :lang="lang" :dir="dir" x-data="rc()" x-init="boot()">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Radio Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap">
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="{{ url_for('static', filename='zzfx.js') }}"></script>
<script src="{{ url_for('static', filename='ident-studio.js') }}"></script>
<style>
:root{
  color-scheme: dark;
  --bg:#101312;--bg-2:#151918;--panel:#171d1b;--panel-2:#1d2824;
  --line:#27312e;--line-2:#2f3b36;--ink:#eef4f0;--ink-2:#aebdb8;--muted:#8fa19a;
  --mint:#71edbd;--mint-2:#76e8bd;--amber:#f1bd64;--blue:#7cc7f2;--violet:#bba3ff;--rose:#f3a8b3;
  font-family:'IBM Plex Sans Arabic','IBM Plex Sans',Tajawal,Cairo,ui-sans-serif,system-ui,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;background:var(--bg);color:var(--ink);min-height:100vh;}
button,input,select,textarea{font:inherit;color:inherit;}
button{cursor:pointer;background:transparent;border:0;}
a{color:inherit;text-decoration:none;}
input,select,textarea{border:1px solid var(--line-2);border-radius:7px;background:#111615;color:var(--ink);padding:8px 10px;font-size:13px;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--mint);}

.shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh;background:linear-gradient(180deg,rgba(113,237,189,0.04),transparent 32%),var(--bg);}
[dir="rtl"] .shell{grid-template-columns:1fr 240px;}
[dir="rtl"] .sidebar{order:2;border-right:0;border-left:1px solid var(--line);}
[dir="rtl"] .workspace{order:1;}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:20px;border-right:1px solid var(--line);background:var(--bg-2);padding:18px 14px;overflow-y:auto;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{display:grid;width:38px;height:38px;place-items:center;border:1px solid #3d4f48;border-radius:10px;background:var(--panel-2);color:var(--mint);}
.brand strong{font-size:13px;font-weight:700;}
.brand small{display:block;color:var(--muted);font-size:10px;}
.section-title{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;padding:0 4px;}
.nav{display:grid;gap:2px;}
.nav button{display:flex;align-items:center;gap:10px;min-height:34px;border-radius:7px;color:var(--ink-2);padding:0 10px;font-size:12.5px;text-align:start;font-weight:500;}
.nav button.active{background:var(--panel-2);color:var(--ink);}
.nav button:hover{background:#202925;color:var(--ink);}
[dir="rtl"] .nav button{text-align:right;}

.station-list{display:grid;gap:5px;}
.station{display:flex;align-items:center;gap:10px;border-radius:7px;padding:8px;color:var(--ink-2);text-align:start;}
[dir="rtl"] .station{text-align:right;}
.station:hover{background:#202925;color:var(--ink);}
.station.active{background:var(--panel-2);color:var(--ink);}
.station strong{font-size:12.5px;font-weight:600;display:block;}
.station small{color:var(--muted);font-size:10.5px;display:block;}
.dot{width:8px;height:8px;border-radius:50%;background:#71827a;flex-shrink:0;}
.dot.live{background:var(--mint-2);box-shadow:0 0 0 3px rgba(113,237,189,0.15);}

/* WORKSPACE */
.workspace{display:grid;grid-template-rows:auto 1fr auto;gap:14px;min-width:0;padding:14px;overflow:hidden;}
.topbar{display:flex;align-items:center;gap:8px;}
.search{display:flex;align-items:center;gap:8px;flex:1;height:40px;border:1px solid var(--line-2);border-radius:8px;background:var(--panel);padding:0 10px;color:var(--muted);}
.search input{flex:1;border:0;background:transparent;padding:0;font-size:13px;}
.kbd{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line-2);border-radius:5px;background:#0e1413;color:var(--muted);padding:2px 6px;font-size:10px;font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace;}
.pill{display:inline-flex;align-items:center;gap:6px;height:40px;border:1px solid var(--line-2);border-radius:8px;background:#1b2320;padding:0 10px;font-size:11.5px;color:var(--amber);font-weight:600;}
.pill.ok{color:var(--mint);}
.pill.warn{color:var(--amber);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:38px;border:1px solid var(--line-2);border-radius:8px;background:#1b2320;color:#dce7e2;padding:0 12px;font-size:12.5px;font-weight:600;white-space:nowrap;}
.btn:hover{background:#26312d;}
.btn.primary{border-color:var(--mint);background:var(--mint);color:#11231d;}
.btn.danger{border-color:var(--rose);background:transparent;color:var(--rose);}
.btn.sm{min-height:30px;padding:0 9px;font-size:11px;}
.icon-btn{display:grid;width:38px;height:38px;place-items:center;border:1px solid var(--line-2);border-radius:8px;background:#1b2320;color:#dce7e2;}
.icon-btn:hover{background:#26312d;}
.lang-toggle{display:flex;border:1px solid var(--line-2);border-radius:8px;overflow:hidden;height:40px;}
.lang-toggle button{padding:0 10px;background:#1b2320;color:var(--muted);font-size:11.5px;font-weight:700;border-inline-end:1px solid var(--line-2);}
.lang-toggle button:last-child{border-inline-end:0;}
.lang-toggle button.active{background:var(--panel-2);color:var(--ink);}

.content{overflow-y:auto;padding-right:4px;scroll-behavior:smooth;}
[dir="rtl"] .content{padding-right:0;padding-left:4px;}
.sec-wrap{margin-bottom:48px;border-bottom:1px solid rgba(255,255,255,0.03);padding-bottom:36px;scroll-margin-top:14px;}
.sec-wrap:last-child{border-bottom:0;margin-bottom:0;padding-bottom:0;}

.pane{border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:16px;}
.pane h2{margin:0 0 4px;font-size:15px;font-weight:700;letter-spacing:-0.01em;}
.pane p.sub{margin:0 0 12px;color:var(--muted);font-size:12px;}
.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;}

.chip{display:inline-flex;align-items:center;border:1px solid var(--line-2);border-radius:999px;background:#202925;color:#d7e3df;padding:3px 9px;font-size:10.5px;font-weight:600;letter-spacing:0.02em;cursor:pointer;}
.chip.mint{border-color:var(--mint);color:var(--mint);background:rgba(113,237,189,0.08);}
.chip.amber{border-color:var(--amber);color:var(--amber);background:rgba(241,189,100,0.08);}
.chip.rose{border-color:var(--rose);color:var(--rose);background:rgba(243,168,179,0.08);}
.chip.selected{background:var(--mint);color:#11231d;border-color:var(--mint);}

.filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}

.list{display:grid;gap:6px;}
.item{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:10px;min-height:48px;border:1px solid #26302c;border-radius:8px;background:#111615;padding:8px 10px;}
.item.row-track{grid-template-columns:24px 32px 1fr auto auto auto;}
.item .meta{min-width:0;}
.item .meta strong{display:block;font-size:13px;font-weight:600;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item .meta small{display:block;font-size:11px;color:var(--muted);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cover{display:grid;width:32px;height:32px;place-items:center;border-radius:6px;background:var(--panel-2);color:var(--mint);}

/* LIVE STRIP */
.live-strip{display:flex;align-items:center;gap:18px;min-height:68px;border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:12px 16px;flex-wrap:wrap;}
.live-strip .now{display:flex;align-items:center;gap:12px;flex:1;min-width:200px;}
.now-img{display:grid;width:42px;height:42px;place-items:center;border-radius:7px;background:var(--panel-2);color:var(--mint);}
.now strong{display:block;font-size:13.5px;font-weight:600;}
.now small{display:block;font-size:11.5px;color:var(--muted);margin-top:2px;}
.metric{display:flex;align-items:center;gap:10px;min-width:110px;}
.metric svg{color:var(--amber);}
.metric strong{display:block;font-size:13.5px;font-weight:700;}
.metric small{display:block;font-size:10.5px;color:var(--muted);}

/* MODAL */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:50;}
.modal{width:520px;max-width:92vw;max-height:88vh;overflow:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:20px;}
.modal h3{margin:0 0 12px;font-size:16px;font-weight:700;}
.modal .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}
.fields{display:grid;gap:10px;}
.fields label{display:grid;gap:5px;color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;}
.fields input,.fields select,.fields textarea{text-transform:none;letter-spacing:0;font-weight:400;font-size:13px;}

/* TIMELINE */
.timeline{overflow-x:auto;direction:ltr;}
[dir="rtl"] .lane-label{text-align:start;direction:rtl;}
.time-row,.lane{display:grid;grid-template-columns:repeat(24,minmax(28px,1fr));min-width:720px;}
.time-row span{border-bottom:1px solid #2a3430;color:#7f9189;padding-bottom:5px;font-size:10px;text-align:start;padding-inline-start:3px;}
.lane{position:relative;min-height:80px;border-bottom:1px solid var(--line);background-image:linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:calc(100% / 24) 100%;padding:8px 0;}
.lane-wrap{position:relative;padding-inline-start:64px;}
.lane-label{position:absolute;inset-inline-start:0;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;width:56px;text-align:end;}
.block{border-radius:6px;margin:0 2px;padding:6px 8px;text-align:start;color:#101312;font-size:11px;font-weight:600;line-height:1.2;cursor:pointer;}
.block strong{display:block;font-size:11px;font-weight:700;}
.block small{display:block;margin-top:2px;opacity:0.72;font-size:10px;}
.color-mint{background:var(--mint-2);}.color-amber{background:var(--amber);}.color-blue{background:var(--blue);}.color-violet{background:var(--violet);}.color-rose{background:var(--rose);}

.console{background:#0b0f0e;color:#71edbd;font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace;font-size:11px;padding:10px;border-radius:8px;border:1px solid var(--line);max-height:280px;overflow-y:auto;}
.console .err{color:#f3a8b3;}

/* === GLASSMORPHIC THEME OVERRIDES (data-theme="glow") === */
body[data-theme="glow"]{
  background:#070a13;
  background-image:radial-gradient(at 10% 10%, rgba(139,92,246,0.15) 0px, transparent 50%), radial-gradient(at 90% 90%, rgba(6,182,212,0.15) 0px, transparent 50%);
}
body[data-theme="glow"] .pane,
body[data-theme="glow"] .modal,
body[data-theme="glow"] .ai-panel{
  background:rgba(17,24,39,0.65);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-color:rgba(255,255,255,0.08);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
body[data-theme="glow"] .live-strip{background:rgba(17,24,39,0.6);backdrop-filter:blur(10px);border-color:rgba(255,255,255,0.08);}
body[data-theme="glow"] .sidebar{background:rgba(7,10,19,0.85);backdrop-filter:blur(10px);border-color:rgba(255,255,255,0.06);}
body[data-theme="glow"] .btn.primary{background:linear-gradient(135deg,#06b6d4,#8b5cf6);border:none;color:#fff;box-shadow:0 4px 10px rgba(6,182,212,0.4);}
body[data-theme="glow"] .ai-fab{background:linear-gradient(135deg,#06b6d4,#8b5cf6);color:#fff;box-shadow:0 6px 20px rgba(139,92,246,0.4);}
body[data-theme="glow"] .pill.ok,
body[data-theme="glow"] .chip.mint{color:#10b981;border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.08);}

/* === VINYL DISC VISUALIZER === */
.vinyl-wrap{display:flex;align-items:center;gap:18px;}
.vinyl-container{position:relative;width:96px;height:96px;flex-shrink:0;}
.vinyl{width:100%;height:100%;border-radius:50%;background:#0a0a0a;border:5px solid #1a1a1a;box-shadow:0 0 16px rgba(0,0,0,0.6),inset 0 0 8px rgba(255,255,255,0.08);overflow:hidden;}
.vinyl::before{content:"";position:absolute;inset:0;background:repeating-radial-gradient(circle at center, rgba(255,255,255,0.04) 0 2px, transparent 2px 4px);border-radius:50%;z-index:1;pointer-events:none;}
.vinyl::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;background:var(--bg);border:3px solid #0a0a0a;box-shadow:inset 0 0 4px rgba(0,0,0,0.6);z-index:3;}
.vinyl-disc{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 30% 30%, var(--mint-2), var(--violet) 60%, #0a0a0a 90%);animation:spin 12s linear infinite;animation-play-state:paused;background-size:cover;background-position:center;}
.vinyl.playing .vinyl-disc{animation-play-state:running;}

.vinyl-arm {
  position:absolute;
  top:-8px;
  right:8px;
  width:24px;
  height:48px;
  border-right:2.5px solid rgba(255,255,255,0.45);
  border-top:2.5px solid rgba(255,255,255,0.45);
  border-top-right-radius:8px;
  transform-origin:100% 0%;
  transform:rotate(-28deg);
  transition:transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
  pointer-events:none;
  z-index:10;
}
.vinyl-arm::after {
  content:"";
  position:absolute;
  bottom:0;
  right:-3.5px;
  width:6px;
  height:10px;
  background:var(--mint);
  border-radius:1px;
  box-shadow:0 0 6px var(--mint);
}
.vinyl-arm.playing {
  transform:rotate(6deg);
}

/* === EMBEDDED PLAYER === */
.player-row{display:flex;align-items:center;gap:10px;margin-top:14px;padding:10px;border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,0.02);}
.player-row audio{flex:1;height:30px;min-width:0;}
.player-row .volume{width:80px;}
.player-toggle{display:grid;place-items:center;width:38px;height:38px;border-radius:50%;background:var(--mint);color:#0a1a14;cursor:pointer;border:0;}
.player-toggle:hover{filter:brightness(1.06);}
.player-toggle.playing{background:var(--rose);color:#fff;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.blinking{animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

.eq{display:inline-flex;align-items:flex-end;gap:3px;height:24px;}
.eq .bar{width:3px;height:4px;background:var(--mint);border-radius:2px;transition:height 0.1s ease;}
.eq .bar:nth-child(3n+1){background:var(--mint);}
.eq .bar:nth-child(3n+2){background:var(--blue);}
.eq .bar:nth-child(3n){background:var(--violet);}

/* === COPILOT === */
.copilot{display:grid;grid-template-columns:240px 1fr;gap:14px;}
@media(max-width:900px){.copilot{grid-template-columns:1fr;}}
.copilot-score{background:rgba(255,255,255,0.02);border:1px solid var(--line);padding:14px;border-radius:10px;display:flex;flex-direction:column;justify-content:center;gap:8px;}
.copilot-score .num{font-size:36px;font-weight:800;color:var(--mint);}
.copilot-score.warn .num{color:var(--amber);}
.copilot-score.danger .num{color:var(--rose);}
.copilot-bar{background:rgba(255,255,255,0.06);height:5px;border-radius:3px;overflow:hidden;}
.copilot-bar-fill{height:100%;background:linear-gradient(90deg,var(--mint),var(--blue));transition:width 0.4s;}
.copilot-suggs{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto;}
.copilot-sugg{display:flex;justify-content:space-between;align-items:center;gap:12px;background:rgba(255,255,255,0.03);border:1px solid var(--line);padding:8px 12px;border-radius:8px;}
.copilot-sugg .badge{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:0.04em;}
.badge.danger{background:rgba(243,168,179,0.15);color:var(--rose);border:1px solid rgba(243,168,179,0.3);}
.badge.warn{background:rgba(241,189,100,0.15);color:var(--amber);border:1px solid rgba(241,189,100,0.3);}
.badge.info{background:rgba(124,199,242,0.15);color:var(--blue);border:1px solid rgba(124,199,242,0.3);}
.badge.muted{background:rgba(143,161,154,0.12);color:var(--muted);border:1px solid var(--line-2);}
.copilot-sugg .desc{font-size:12.5px;color:var(--ink);flex:1;min-width:0;}
.copilot-empty{text-align:center;color:var(--mint);font-size:13px;padding:18px;background:rgba(113,237,189,0.05);border:1px solid rgba(113,237,189,0.2);border-radius:8px;}

/* === STATION TEMPLATE PICKER === */
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.tpl-card{border:1px solid var(--line-2);border-radius:9px;background:#111615;padding:10px 12px;cursor:pointer;transition:border-color 0.15s;text-align:start;}
.tpl-card:hover{border-color:var(--mint);}
.tpl-card.selected{border-color:var(--mint);background:rgba(113,237,189,0.06);}
.tpl-card strong{display:block;font-size:13px;font-weight:700;margin-bottom:4px;}
.tpl-card small{display:block;font-size:11px;color:var(--muted);line-height:1.4;}

/* === HORIZONTAL 24H DRAG-DROP TIMELINE === */
.builder-toggle{display:inline-flex;border:1px solid var(--line-2);border-radius:8px;overflow:hidden;}
.builder-toggle button{padding:6px 14px;background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;border:0;}
.builder-toggle button.active{background:var(--panel-2);color:var(--ink);}

.tl24-wrap{width:100%;overflow-x:auto;border:1px solid var(--line);border-radius:10px;background:rgba(0,0,0,0.25);}
.tl24{position:relative;height:160px;width:2400px;user-select:none;direction:ltr;}
.tl24.dragover{background:rgba(113,237,189,0.04);}
.tl24-hours{display:grid;grid-template-columns:repeat(24,1fr);height:30px;border-bottom:1px solid rgba(255,255,255,0.06);}
.tl24-hours span{font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace;font-size:11px;color:var(--muted);text-align:center;padding-top:8px;border-inline-start:1px solid rgba(255,255,255,0.04);}
.tl24-blocks{position:relative;height:130px;padding:8px 0;background-image:linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px);background-size:100px 100%;}
.tl24-block{position:absolute;top:10px;height:calc(100% - 20px);border-radius:8px;padding:8px 12px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;gap:2px;font-size:11.5px;font-weight:600;overflow:hidden;transition:transform 0.15s, box-shadow 0.15s;border:1px solid rgba(255,255,255,0.08);min-width:48px;box-shadow:0 3px 10px rgba(0,0,0,0.3);}
.tl24-block:hover{transform:translateY(-2px);}
.tl24-block.selected-block{border-color:var(--mint);box-shadow:0 0 12px rgba(113,237,189,0.3);transform:scale(1.02);z-index:4;}

.tl24-block.type-ai-show{background:linear-gradient(135deg,rgba(124,199,242,0.18),rgba(187,163,255,0.12));border-color:rgba(124,199,242,0.3);color:var(--ink);}
.tl24-block.type-music{background:linear-gradient(135deg,rgba(113,237,189,0.18),rgba(124,199,242,0.1));border-color:rgba(113,237,189,0.3);color:var(--ink);}
.tl24-block.type-weather{background:linear-gradient(135deg,rgba(241,189,100,0.18),rgba(243,168,179,0.1));border-color:rgba(241,189,100,0.3);color:var(--ink);}
.tl24-block.type-voice{background:linear-gradient(135deg,rgba(243,168,179,0.18),rgba(187,163,255,0.1));border-color:rgba(243,168,179,0.3);color:var(--ink);}
.tl24-block .block-title{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl24-block .block-time{font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace;font-size:10px;opacity:0.75;}
.tl24-block .block-x{position:absolute;top:5px;inset-inline-end:5px;width:18px;height:18px;border-radius:50%;background:rgba(243,168,179,0.3);color:var(--rose);font-size:11px;display:none;align-items:center;justify-content:center;cursor:pointer;border:0;}
.tl24-block:hover .block-x{display:flex;}
.tl24-now{position:absolute;top:0;bottom:0;width:2px;background:var(--mint-2);box-shadow:0 0 8px var(--mint-2);z-index:5;pointer-events:none;}
.tl24-now::before{content:"▼";position:absolute;top:-2px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--mint-2);}

.src-drawers{display:grid;gap:8px;}
.src-drawer{background:rgba(0,0,0,0.15);border:1px solid var(--line);border-radius:9px;overflow:hidden;}
.src-drawer-head{padding:9px 12px;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--line);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.src-drawer-head h4{font-size:12.5px;font-weight:700;margin:0;}
.src-drawer-head .count{font-size:10px;padding:1px 7px;border-radius:99px;background:rgba(255,255,255,0.06);color:var(--muted);font-weight:600;}
.src-drawer-body{max-height:200px;overflow-y:auto;padding:8px;display:grid;gap:5px;}
.src-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(255,255,255,0.03);border:1px solid var(--line-2);border-radius:6px;cursor:grab;font-size:11.5px;}
.src-item:hover{background:rgba(255,255,255,0.06);}
.src-item:active{cursor:grabbing;}

/* AI ASSISTANT */
.ai-fab{position:fixed;bottom:96px;inset-inline-end:18px;display:flex;align-items:center;gap:8px;padding:0 16px;height:46px;border-radius:23px;background:linear-gradient(135deg,#71edbd,#7cc7f2);color:#11231d;font-size:13px;font-weight:700;box-shadow:0 6px 20px rgba(113,237,189,0.35);cursor:pointer;border:0;z-index:55;}
.ai-fab:hover{filter:brightness(1.06);}
.ai-panel{position:fixed;top:0;inset-inline-end:0;bottom:0;width:380px;max-width:92vw;background:var(--panel);border-inline-start:1px solid var(--line);display:flex;flex-direction:column;z-index:55;box-shadow:-10px 0 30px rgba(0,0,0,0.4);}
.ai-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);}
.ai-head .grow{flex:1;min-width:0;}
.ai-head strong{font-size:13px;font-weight:700;display:block;}
.ai-head small{font-size:11px;color:var(--muted);display:block;}
.ai-quick{padding:8px 12px;border-bottom:1px solid var(--line);display:flex;gap:6px;flex-wrap:wrap;}
.ai-quick button{padding:5px 9px;border:1px solid var(--line-2);border-radius:999px;background:#1b2320;color:var(--ink-2);font-size:11px;font-weight:600;cursor:pointer;}
.ai-quick button:hover{background:var(--panel-2);color:var(--ink);border-color:var(--mint);}
.ai-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.ai-msg{display:flex;flex-direction:column;max-width:88%;padding:9px 12px;border-radius:10px;font-size:13px;line-height:1.5;}
.ai-msg.user{align-self:flex-end;background:var(--panel-2);color:var(--ink);border:1px solid var(--line-2);}
.ai-msg.assistant{align-self:flex-start;background:rgba(113,237,189,0.08);color:var(--ink);border:1px solid rgba(113,237,189,0.3);}
.ai-msg.tool{align-self:flex-start;background:#0e1413;color:var(--muted);border:1px solid var(--line);font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace;font-size:10.5px;white-space:pre-wrap;max-width:96%;}
.ai-typing{align-self:flex-start;color:var(--muted);font-size:12px;font-style:italic;}
.ai-input-row{display:flex;align-items:flex-end;gap:6px;padding:10px 12px;border-top:1px solid var(--line);}
.ai-input-row textarea{flex:1;min-height:42px;max-height:140px;border:1px solid var(--line-2);border-radius:8px;background:#111615;padding:10px 12px;font-size:13px;resize:none;}
.ai-input-row button{height:42px;}

/* TOASTS */
.toasts{position:fixed;bottom:18px;inset-inline-end:18px;display:flex;flex-direction:column;gap:8px;z-index:60;pointer-events:none;}
.toast{pointer-events:auto;display:flex;align-items:center;gap:10px;min-width:240px;max-width:360px;border:1px solid var(--line);border-radius:9px;background:var(--panel);padding:10px 14px;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.toast.ok{border-color:var(--mint);}
.toast.err{border-color:var(--rose);}
.toast.warn{border-color:var(--amber);}
.toast strong{font-size:12.5px;font-weight:700;display:block;}
.toast small{font-size:11.5px;color:var(--muted);display:block;}

[x-cloak]{display:none!important;}

@media(max-width:1100px){
  .shell{grid-template-columns:78px 1fr;}
  [dir="rtl"] .shell{grid-template-columns:1fr 78px;}
  .brand div,.station strong,.station small,.section-title,.nav button span{display:none;}
  .sidebar{align-items:center;padding:16px 8px;}
  .nav button{justify-content:center;width:42px;padding:0;}
  .station{justify-content:center;padding:7px;}
}
@media(max-width:700px){
  .shell{grid-template-columns:1fr;}
  .sidebar{display:none;}
}

/* Calendar Grid & Strip */
.calendar-strip {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}
.calendar-day {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 4px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.04);
  cursor: pointer;
  transition: all 0.2s ease;
}
.calendar-day:hover {
  background: rgba(255, 255, 255, 0.06);
}
.calendar-day.active {
  background: rgba(113, 237, 189, 0.1);
  border-color: var(--mint);
}
.calendar-day.has-shows {
  position: relative;
}
.calendar-day.has-shows::after {
  content: "";
  position: absolute;
  bottom: 5px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--mint);
  box-shadow: 0 0 6px var(--mint);
}
.calendar-day-name {
  font-size: 10px;
  color: var(--muted);
  font-weight: 500;
}
.calendar-day-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 16px;
  font-weight: 700;
  margin-top: 2px;
}

/* Studio Split Workspace */
.studio-workspace {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 24px;
  align-items: start;
  margin-top: 24px;
}
@media (max-width: 1024px) {
  .studio-workspace {
    grid-template-columns: 1fr;
  }
}
.studio-col {
  display: flex;
  flex-direction: column;
  gap: 24px;
  min-width: 0;
}

/* Tabs Script Viewer */
.tabs-header {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  padding-bottom: 10px;
  overflow-x: auto;
}
.tab-trigger {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  font-weight: 500;
  font-size: 13.5px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s ease;
}
.tab-trigger:hover {
  color: var(--ink);
  background: rgba(255, 255, 255, 0.02);
}
.tab-trigger.active {
  color: var(--ink);
  background: rgba(255, 255, 255, 0.06);
  border-color: var(--line-2);
}
.tab-trigger.active.show-morning { border-bottom: 3px solid var(--mint); }
.tab-trigger.active.show-afternoon { border-bottom: 3px solid var(--amber); }
.tab-trigger.active.show-evening { border-bottom: 3px solid var(--blue); }
.tab-trigger.active.show-night { border-bottom: 3px solid var(--violet); }

.script-viewer {
  background: rgba(0, 0, 0, 0.2);
  border-radius: 12px;
  padding: 24px;
  border: 1px solid rgba(255, 255, 255, 0.03);
  min-height: 250px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.script-header-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
  font-size: 12.5px;
  color: var(--muted);
  flex-wrap: wrap;
  gap: 10px;
}
.script-text {
  font-size: 15.5px;
  line-height: 1.8;
  color: var(--ink);
  text-align: justify;
  margin-bottom: 25px;
  white-space: pre-wrap;
}
.script-empty {
  color: var(--muted);
  text-align: center;
  margin: auto 0;
  font-style: italic;
  font-size: 14px;
}
.script-actions {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  padding-top: 15px;
}

/* Terminal Console */
.terminal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.terminal-dots {
  display: flex;
  gap: 6px;
}
.terminal-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
.terminal-dot.red { background-color: #ef4444; }
.terminal-dot.yellow { background-color: #f59e0b; }
.terminal-dot.green { background-color: #10b981; }
.terminal-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}
.console {
  background: #030712;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  padding: 16px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12.5px;
  color: #34d399;
  height: 200px;
  overflow-y: auto;
  white-space: pre-wrap;
  box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
  direction: ltr;
  text-align: left;
}
.console::-webkit-scrollbar { width: 8px; }
.console::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
.gen-panel {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  align-items: center;
}

/* Draggable Drawers & Compact Cards */
.source-drawer {
  background: rgba(0, 0, 0, 0.15);
  border: 1px solid var(--line-2);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 12px;
  transition: all 0.2s;
  width: 100%;
}
.source-drawer:hover {
  border-color: rgba(255, 255, 255, 0.12);
}
.drawer-header {
  padding: 12px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255, 255, 255, 0.02);
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  cursor: pointer;
  user-select: none;
}
.drawer-header h3 {
  font-size: 13.5px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 0;
}
.drawer-header .count-badge {
  font-size: 9.5px;
  padding: 1px 6px;
  border-radius: 9999px;
  background: rgba(255, 255, 255, 0.06);
  color: var(--muted);
  font-weight: 600;
}
.drawer-body {
  padding: 10px;
  max-height: 300px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 100%;
}
.drawer-body::-webkit-scrollbar { width: 5px; }
.drawer-body::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 3px; }

.source-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.06);
  cursor: grab;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink);
  transition: all 0.15s;
  width: 100%;
  user-select: none;
}
.source-item:hover {
  background: rgba(255, 255, 255, 0.06);
  border-color: rgba(255, 255, 255, 0.1);
  transform: translateY(-1px);
}
.source-item:active { cursor: grabbing; }

.song-card-compact {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 8px 12px;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.04);
  border-radius: 8px;
  transition: all 0.15s ease;
  width: 100%;
  cursor: grab;
  user-select: none;
}
.song-card-compact:hover {
  background: rgba(255, 255, 255, 0.05);
  border-color: rgba(255, 255, 255, 0.1);
}
.song-card-compact:active {
  cursor: grabbing;
}
.song-title-compact {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--ink);
  display: block;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.song-style-compact {
  font-size: 9.5px;
  color: var(--mint);
  display: block;
}
.preview-mini-btn {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: rgba(113, 237, 189, 0.12);
  border: 1px solid rgba(113, 237, 189, 0.25);
  color: var(--mint);
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
  flex-shrink: 0;
}
.preview-mini-btn:hover {
  background: var(--mint);
  color: #000;
  box-shadow: 0 0 8px var(--mint);
}
.drag-handle-badge {
  font-size: 9px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.04);
  padding: 1px 5px;
  border-radius: 4px;
  border: 1px solid rgba(255, 255, 255, 0.02);
  flex-shrink: 0;
}
.quick-add-select {
  font-size: 10.5px;
  padding: 2px 4px;
  height: 22px;
  background: #111615;
  border: 1px solid var(--line-2);
  border-radius: 4px;
  color: var(--ink-2);
  cursor: pointer;
}
</style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"><i data-lucide="radio" style="width:18px;height:18px"></i></div>
      <div>
        <strong>Radio Control</strong>
        <small x-text="baseUrl.replace(/^https?:\/\//,'')"></small>
      </div>
    </div>

    <!-- Dynamic Labeled Group Navigation -->
    <template x-for="g in ['onair', 'content', 'scheduling', 'channels', 'system']" :key="g">
      <div style="margin-top:6px">
        <div class="section-title" x-text="t('group_' + g)" style="font-size:9px; opacity:0.8; margin-bottom:4px; padding-top:4px; border-top:1px solid rgba(255,255,255,0.03);"></div>
        <nav class="nav">
          <template x-for="v in views.filter(x => x.group === g)" :key="v.id">
            <button :class="tab===v.id ? 'active' : ''" @click="scrollToSection(v.id)">
              <i :data-lucide="v.icon" style="width:15px;height:15px;flex-shrink:0"></i>
              <span x-text="t(v.id)"></span>
            </button>
          </template>
        </nav>
      </div>
    </template>


    <div>
      <div class="section-title" x-text="t('stations')"></div>
      <div class="station-list">
        <template x-for="s in filteredStations" :key="s.id">
          <button class="station" :class="active && active.id===s.id && 'active'" @click="setActive(s)">
            <span class="dot" :class="isLive(s.id) && 'live'"></span>
            <div style="min-width:0;flex:1">
              <strong x-text="s.name"></strong>
              <small x-text="s.short_name"></small>
            </div>
          </button>
        </template>
        <button class="station" @click="showCreateStation=true" style="border:1px dashed var(--line-2);justify-content:center;color:var(--mint);">
          <i data-lucide="plus" style="width:14px;height:14px"></i>
          <span x-text="t('add')"></span>
        </button>
      </div>
    </div>
  </aside>

  <!-- WORKSPACE -->
  <main class="workspace">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="search">
        <i data-lucide="search" style="width:14px;height:14px;color:var(--muted)"></i>
        <input :placeholder="t('search_ph')" x-model="q"/>
        <span class="kbd">⌘K</span>
      </div>
      <div class="pill" :class="configured && 'ok'">
        <i :data-lucide="configured?'check-circle-2':'alert-circle'" style="width:14px;height:14px"></i>
        <span x-text="configured ? t('connected') : t('offline')"></span>
      </div>
      <div class="pill" :class="streamStatus.type==='offline' ? 'warn' : 'ok'" x-show="active" x-cloak>
        <span class="dot" :class="streamStatus.type !== 'offline' ? 'live' : ''" style="margin-inline-end: 2px;"></span>
        <span x-text="streamStatus.label"></span>
      </div>

      <div class="pill warn" x-show="weatherData && weatherData.current && weatherData.current.temp_c" x-cloak>
        <i data-lucide="cloud-sun" style="width:14px;height:14px"></i>
        <span x-text="(weatherData?.current?.description_ar || '')+' · '+(weatherData?.current?.temp_c || '--')+'°'"></span>
      </div>
      <div class="lang-toggle">
        <button :class="lang==='ar' && 'active'" @click="setLang('ar')">عربي</button>
        <button :class="lang==='en' && 'active'" @click="setLang('en')">EN</button>
      </div>
      <button class="icon-btn" @click="toggleTheme()" :title="t('theme')"><i data-lucide="palette" style="width:14px;height:14px"></i></button>
      <button class="icon-btn" @click="refresh()" :title="t('refresh')"><i data-lucide="refresh-cw" style="width:14px;height:14px"></i></button>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- ╔═══ LIVE ═══╗ -->
      <section id="sec-live" class="sec-wrap">
        <!-- AI COPILOT -->
        <div class="pane" style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <h2 x-text="t('copilot_title')"></h2>
            <button class="btn sm" @click="loadCopilot()"><i data-lucide="refresh-cw" style="width:12px;height:12px"></i></button>
          </div>
          <p class="sub" x-text="t('copilot_sub')"></p>
          <div class="copilot">
            <div class="copilot-score" :class="copilot.score>=70?'':copilot.score>=50?'warn':'danger'">
              <div class="num" x-text="(copilot.score||0)+'%'"></div>
              <div style="font-size:13px;font-weight:700" x-text="copilot.status_text || t('analyzing')"></div>
              <div class="copilot-bar"><div class="copilot-bar-fill" :style="`width:${copilot.score||0}%`"></div></div>
              <div style="font-size:11px;color:var(--muted)" x-text="copilot.totals ? `${copilot.totals.enabled} ${t('playlists')} · ${copilot.totals.files} ${t('files')} · ${copilot.totals.queue} ${t('queue')}` : ''"></div>
            </div>
            <div class="copilot-suggs">
              <template x-for="s in (copilot.suggestions||[])" :key="s.id">
                <div class="copilot-sugg">
                  <div style="display:flex;align-items:center;gap:10px;min-width:0">
                    <span class="badge" :class="s.badgeClass" x-text="s.badge"></span>
                    <span class="desc" x-text="s.desc"></span>
                  </div>
                  <button class="btn sm primary" @click="applyCopilotSuggestion(s)"><i data-lucide="sparkles" style="width:11px;height:11px"></i> <span x-text="t('apply')"></span></button>
                </div>
              </template>
              <div x-show="copilot.suggestions && copilot.suggestions.length===0" class="copilot-empty" x-text="t('copilot_empty')"></div>
            </div>
          </div>
        </div>

        <div class="row" style="margin-bottom:14px">
          <div class="pane" style="grid-column:span 2">
            <h2 x-text="t('now_playing')"></h2>
            <p class="sub" x-text="active && active.name"></p>
            <div class="vinyl-wrap" style="margin-top:10px">
              <div class="vinyl-container">
                <div class="vinyl" :class="streamPlaying && 'playing'">
                  <div class="vinyl-disc" :style="currentArt ? `background-image:url('${currentArt}')` : ''"></div>
                </div>
                <div class="vinyl-arm" :class="streamPlaying && 'playing'"></div>
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-size:18px;font-weight:700" x-text="currentTrack || t('no_live')"></div>
                <div style="color:var(--muted);font-size:13px;margin-top:3px" x-text="t('next')+': '+(nextTrack||'—')"></div>
                <canvas id="visualizer-canvas" width="320" height="40" style="width: 100%; height: 40px; background: rgba(0,0,0,0.15); border-radius: 8px; border: 1px solid rgba(255,255,255,0.02); margin: 5px 0;"></canvas>
                <div class="eq" :class="streamPlaying && 'playing'" style="margin-top:8px">
                  <template x-for="(lvl,i) in eqLevels" :key="i">
                    <div class="bar" :style="`height:${Math.max(4,lvl)}px`"></div>
                  </template>
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:6px">
                <button class="btn" @click="skipSong()" :disabled="!currentTrack"><i data-lucide="skip-forward" style="width:14px;height:14px"></i><span x-text="t('skip')"></span></button>
                <button class="btn primary" @click="buildQueue()"><i data-lucide="play" style="width:14px;height:14px"></i><span x-text="t('build_queue')"></span></button>
                <button class="btn" @click="openIdent()"><i data-lucide="wand-2" style="width:14px;height:14px"></i><span x-text="t('ident_studio')"></span></button>
              </div>
            </div>
            <div class="player-row">
              <button class="player-toggle" :class="streamPlaying && 'playing'" @click="toggleStream()" :title="t('listen_live')">

                          <option :value="hr.value" x-text="hr.label"></option>

              </div>
            </div>
            
          </div>
        </div>

        <div class="row">
          <div class="pane">
            <h2 x-text="t('queue')"></h2>
            <p class="sub" x-text="t('queue_sub')"></p>

              <template x-for="(q,i) in queue.slice(0,8)" :key="(q.cued_at||'')+i">

          </div>

                  <div class="meta"><strong x-text="(h.song && h.song.text) || '—'"></strong><small x-text="formatTime(h.played_at)"></small></div>
                  <span class="chip" x-text="h.playlist || ''"></span>

              </template>
              <div x-show="history.length===0" style="color:var(--muted);font-size:12px;text-align:center;padding:16px" x-text="t('no_history')"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- ╔═══ MEDIA ═══╗ -->
      <section id="sec-media" class="sec-wrap">
        <div class="pane">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
            <div>
              <h2 x-text="t('media_library')"></h2>
              <p class="sub" x-text="t('media_sub')"></p>
            </div>
            <div style="display:flex;gap:6px">
              <button class="btn" @click="showBulkAssign=true" :disabled="!selected.length"><i data-lucide="layers" style="width:14px;height:14px"></i><span x-text="t('bulk_assign')+' ('+selected.length+')'"></span></button>
              <label class="btn primary" style="cursor:pointer">
                <input type="file" hidden multiple @change="uploadFiles($event)" accept="audio/*"/>
                <i data-lucide="upload" style="width:14px;height:14px"></i>
                <span x-text="t('upload')"></span>
              </label>
            </div>
          </div>
          <div class="filters">
            <template x-for="r in regions" :key="r">
              <button class="chip" :class="region===r && 'selected'" @click="region=(region===r?'':r)" x-text="t(r)"></button>

          </div>
          <div class="list">
            <template x-for="(m,i) in filteredMedia" :key="m.id||i">
              <div class="item row-track">
                <input type="checkbox" :checked="selected.includes(m.id)" @change="toggleSelect(m.id)" style="width:14px;height:14px;border:1px solid var(--line-2);background:#111615;cursor:pointer"/>
                <div class="cover"><i data-lucide="music-2" style="width:14px;height:14px"></i></div>
                <div class="meta"><strong x-text="m.title"></strong><small x-text="(m.artist||'—')+' · '+(m.album||'—')"></small></div>
                <span class="chip" x-text="(m.region||'global').toUpperCase()"></span>
                <span x-show="m.playlists.length" class="chip mint" x-text="m.playlists.map(p=>p.name).join(', ')"></span>
                <span style="color:var(--muted);font-size:11px" x-text="m.length_text || formatLen(m.length)"></span>
              </div>
            </template>
            <div x-show="filteredMedia.length===0" style="color:var(--muted);font-size:12px;text-align:center;padding:24px" x-text="t('no_media')"></div>
          </div>
        </div>

        <!-- EXTERNAL MUSIC LIBRARY (ACE-Step / Suno via Guide) -->
        <div class="pane" style="margin-top:14px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap">
            <div><h2 x-text="t('music_library_ext')"></h2><p class="sub" x-text="t('music_library_ext_sub')"></p></div>
            <button class="btn" @click="loadExternalSongs()"><i data-lucide="refresh-cw" style="width:12px;height:12px"></i><span x-text="t('refresh')"></span></button>
          </div>
          <div class="list" style="margin-top:8px">
            <template x-for="(s,i) in externalSongs" :key="s.id || i">
              <div class="item">
                <div class="cover"><i data-lucide="music-2" style="width:14px;height:14px"></i></div>
                <div class="meta">
                  <strong x-text="s.title || s.name || '—'"></strong>
                  <small x-text="(s.style || s.genre || '') + (s.created_at ? (' · ' + s.created_at) : '')"></small>
                </div>
                <span class="chip" x-text="(s.duration_sec ? Math.round(s.duration_sec)+'s' : '')"></span>
                <button class="btn sm primary" @click="injectExternalSong(s)" :disabled="injectingId===s.id">
                  <i data-lucide="upload" style="width:11px;height:11px"></i>
                  <span x-text="injectingId===s.id ? t('saving') : t('inject_to_az')"></span>
                </button>
              </div>
            </template>
            <div x-show="externalSongs.length===0" style="color:var(--muted);font-size:12px;text-align:center;padding:18px" x-text="t('no_external_songs')"></div>

        </div>

            <label><span x-text="t('voice')"></span>
              <select x-model="ttsVoice">
                <option value="" x-text="t('default_voice')"></option>
                <template x-for="v in voices" :key="v.id || v.name"><option :value="v.id || v.name" x-text="v.name || v.id"></option></template>
              </select>
            </label>
            <label><span x-text="t('tts_text')"></span>
              <textarea x-model="ttsText" rows="3" :placeholder="t('tts_placeholder')"></textarea>
            </label>
          </div>
          <button class="btn primary" style="margin-top:8px" @click="speakAndInject()" :disabled="ttsBusy || !ttsText.trim()">
            <i data-lucide="mic" style="width:14px;height:14px"></i>
            <span x-text="ttsBusy ? t('saving') : t('generate_upload')"></span>
          </button>
        </div>
      </section>

      <!-- ╔═══ PLAYLISTS ═══╗ -->
      <section id="sec-playlists" class="sec-wrap">
        <div class="pane">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">

            <button class="btn primary" @click="showCreatePlaylist=true"><i data-lucide="plus" style="width:14px;height:14px"></i><span x-text="t('new_playlist')"></span></button>
          </div>
          <div class="list" style="margin-top:8px">
            <template x-for="(p,i) in filteredPlaylists" :key="p.id||i">
              <div class="item">
                <div class="cover"><i data-lucide="list-music" style="width:14px;height:14px"></i></div>
                <div class="meta">
                  <strong x-text="p.name"></strong>
                  <small><span x-text="t('type_'+(p.type||'default'))"></span> · <span x-text="t('weight')+': '+(p.weight||3)"></span> · <span x-text="(p.num_songs||0)+' '+t('songs')"></span></small>

                <span class="chip" :class="p.is_enabled ? 'mint' : 'rose'" x-text="p.is_enabled ? t('enabled') : t('disabled')"></span>

                  <button class="btn sm" @click="openFolderModal(p)" :title="t('folder_auto_assign')"><i data-lucide="folder" style="width:12px;height:12px"></i></button>
                  <button class="btn sm" @click="togglePlaylist(p)"><i :data-lucide="p.is_enabled?'pause':'play'" style="width:12px;height:12px"></i></button>
                  <button class="btn sm danger" @click="deletePlaylist(p)"><i data-lucide="trash-2" style="width:12px;height:12px"></i></button>
                </div>
              </div>
            </template>
          </div>
        </div>

              <div class="builder-toggle">
                <button :class="builderView==='week' && 'active'" @click="builderView='week'" x-text="t('view_week')"></button>
                <button :class="builderView==='day' && 'active'" @click="builderView='day'; $nextTick(()=>scrollTimelineToNow())" x-text="t('view_day')"></button>
              </div>
              <button class="btn primary" @click="showAddSchedule=true"><i data-lucide="plus" style="width:14px;height:14px"></i><span x-text="t('add_schedule')"></span></button>
            </div>
          </div>

              <div class="src-drawers">

                  <div class="src-drawer-head"><h4>🎵 <span x-text="t('media')"></span></h4><span class="count" x-text="media.length"></span></div>
                  <div class="src-drawer-body">
                    <template x-for="m in media.slice(0,20)" :key="m.id">
                      <div class="src-item" draggable="true" @dragstart="onDragStart($event,{type:'music',title:m.title,duration:Math.ceil((m.length||60)/60),data:m})">
                        <i data-lucide="music-2" style="width:11px;height:11px;color:var(--mint)"></i>
                        <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="m.title"></span>
                        <span style="font-size:9px;color:var(--muted);background:rgba(255,255,255,0.04);padding:1px 4px;border-radius:3px">⋮⋮</span>
                      </div>
                    </template>
                  </div>
                </div>
                <div class="src-drawer">
                  <div class="src-drawer-head"><h4>🎙️ <span x-text="t('playlists')"></span></h4><span class="count" x-text="playlists.filter(p=>p.is_enabled).length"></span></div>
                  <div class="src-drawer-body">
                    <template x-for="p in playlists.filter(p=>p.is_enabled)" :key="p.id">
                      <div class="src-item" draggable="true" @dragstart="onDragStart($event,{type:'ai-show',key:'pl_'+p.id,title:p.name,duration:60,data:p})">
                        <i data-lucide="list-music" style="width:11px;height:11px;color:var(--blue)"></i>
                        <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="p.name"></span>
                        <span style="font-size:9px;color:var(--muted);background:rgba(255,255,255,0.04);padding:1px 4px;border-radius:3px">⋮⋮</span>
                      </div>
                    </template>
                  </div>
                </div>
                <div class="src-drawer">
                  <div class="src-drawer-head"><h4>🌤 <span x-text="t('weather')"></span> / 🗣️ <span x-text="t('voices')"></span></h4></div>
                  <div class="src-drawer-body">
                    <div class="src-item" draggable="true" @dragstart="onDragStart($event,{type:'weather',title:'🌤 '+t('weather_block'),duration:5})">
                      <i data-lucide="cloud-sun" style="width:11px;height:11px;color:var(--amber)"></i>
                      <span style="flex:1" x-text="'🌤 '+t('weather_block')"></span>
                    </div>
                    <template x-for="v in voices" :key="v.id">
                      <div class="src-item" draggable="true" @dragstart="onDragStart($event,{type:'voice',title:v.name,duration:30,data:v})">
                        <i data-lucide="mic" style="width:11px;height:11px;color:var(--rose)"></i>
                        <span x-text="v.name"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </div>

              <div class="tl24-wrap" id="tl24-wrap">
                <div class="tl24" :class="isDragging && 'dragover'"
                     @dragover.prevent
                     @dragenter.prevent="isDragging=true"
                     @dragleave="isDragging=false"
                     @drop.prevent="handleDayDrop($event)">
                  <div class="tl24-hours">
                    <template x-for="h in 24"><span x-text="pad(h-1)+':00'"></span></template>
                  </div>
                  <div class="tl24-blocks" id="tl24-blocks">
                    <div class="tl24-now" :style="`left:${nowOffsetPercent()}%`"></div>
                    <template x-for="b in dayBlocks" :key="b.id">
                      <div class="tl24-block" :class="['type-' + b.type, selectedDayBlockId === b.id ? 'selected-block' : '']" :style="blockStyle(b)" @click.stop="selectDayBlock(b)">
                        <div class="block-title" x-text="getBlockIcon(b.type)+' '+b.title"></div>
                        <div class="block-time" x-text="formatBlockTime(b)"></div>
                        <button class="block-x" @click.stop="removeDayBlock(b.id)">×</button>
                      </div>
                    </template>
                    <div x-show="dayBlocks.length===0" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--muted);font-size:12px;text-align:center;pointer-events:none;opacity:0.7">
                      <i data-lucide="move" style="width:20px;height:20px;margin-bottom:4px"></i>
                      <div x-text="t('drag_drop_hint')"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <!-- BLOCK EDITOR PANEL -->
            <template x-if="selectedBlock">
              <div class="pane" style="margin-top:12px; border-color:rgba(113,237,189,0.3); background:rgba(113,237,189,0.02); max-width: 600px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                  <h3 style="margin:0; font-size:13px; font-weight:700; color:var(--mint);">
                    <span x-text="t('edit_block')"></span>: <span x-text="selectedBlock?.title"></span>
                  </h3>
                  <button class="btn sm danger" @click="selectedBlock && removeDayBlock(selectedBlock.id)" x-text="t('delete_block')"></button>
                </div>
                <div class="row" style="grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:10px;">
                  <label style="display:grid; gap:4px; font-size:11px; color:var(--muted);">
                    <span x-text="t('start_time')"></span>
                    <select :value="selectedBlock?.startHour"
                            @change="if(selectedBlock) { selectedBlock.startHour = parseInt($event.target.value); saveBlocks(); }">
                      <template x-for="h in Array.from({length: 24}, (_, i) => i)">
                        <option :value="h" x-text="pad(h) + ':00'"></option>
                      </template>
                    </select>
                  </label>
                  <label style="display:grid; gap:4px; font-size:11px; color:var(--muted);">
                    <span x-text="t('duration_mins')"></span>
                    <input type="number" min="5" max="1440"
                           :value="selectedBlock?.durationMins"
                           @input="if(selectedBlock) { selectedBlock.durationMins = parseInt($event.target.value) || 60; saveBlocks(); }"
                           style="width: 100%;" />
                  </label>
                </div>
              </div>
            </template>

            <p class="sub" style="margin-top:8px;font-size:10.5px" x-text="t('day_builder_note')"></p>
          </div>


          <!-- WEEK GRID (existing) -->

                <template x-for="h in 24"><span x-text="pad(h-1)"></span></template>

              <div class="lane-wrap">
                <span class="lane-label" x-text="t(d)"></span>
                <div class="lane">
                  <template x-for="b in blocksFor(di+1)" :key="b.id">
                    <div class="block" :class="'color-'+b.color" :style="`grid-column:${(b.start/100|0)+1}/${Math.ceil(b.end/100)+1}`" @click="removeScheduleItem(b)">
                      <strong x-text="b.name"></strong>
                      <small x-text="formatHHMM(b.start)+' — '+formatHHMM(b.end)"></small>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
          <p class="sub" style="margin-top:10px;font-size:11px" x-text="t('schedule_click_hint')"></p>
          </div><!-- /builderView=week -->
        </div>
      </section>

                <div class="item">
                  <div class="cover"><i data-lucide="user" style="width:12px;height:12px"></i></div>

        </div>
        <div class="row">
          <div class="pane">
