  // ---- DAY BUILDER ----
  saveBlocks(){
    if(!this.active)return;
    // Mirror to localStorage immediately for instant rebound on next load
    try{localStorage.setItem('rc_blocks_'+this.active.id,JSON.stringify(this.dayBlocks));}catch(_){}
    // Persist to server (debounced — coalesce rapid edits)
    clearTimeout(this._blockSaveT);
    this._blockSaveT=setTimeout(async()=>{
      try{
        await fetch(`/api/v1/stations/${this.active.id}/day-blocks`,{
          method:'PUT', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({blocks:this.dayBlocks})
        });
      }catch(e){/* localStorage already has it */}
    },600);
  },
  onDragStart(ev,item){this.isDragging=true;ev.dataTransfer.setData('application/json',JSON.stringify(item));ev.dataTransfer.effectAllowed='copy';},
  handleDayDrop(ev){
    this.isDragging=false;
    const raw=ev.dataTransfer.getData('application/json');if(!raw)return;
    try{
      const item=JSON.parse(raw);
      const ruler=ev.currentTarget;
      const rect=ruler.getBoundingClientRect();
      const x=ev.clientX-rect.left;
      const hourFloat=(x/rect.width)*24;
      const hour=Math.max(0,Math.min(23,Math.floor(hourFloat)));
      this.addDayBlock(item,hour);
    }catch(e){this.toast('drop error',e.message,'err');}
  },
  addDayBlock(item,startHour){
    let durationMins=60;
    if(item.type==='music')durationMins=Math.max(2,(item.duration||4));
    if(item.type==='weather')durationMins=item.duration||5;
    if(item.type==='voice')durationMins=item.duration||10;
    if(item.type==='ai-show')durationMins=item.duration||60;
    const block={id:'b_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),type:item.type,title:item.title||'—',startHour,durationMins,data:item.data||null};
    this.dayBlocks.push(block);this.selectedDayBlockId=block.id;this.saveBlocks();this.$nextTick(()=>this.tick());
  },
  removeDayBlock(id){this.dayBlocks=this.dayBlocks.filter(b=>b.id!==id);if(this.selectedDayBlockId===id)this.selectedDayBlockId=null;this.saveBlocks();},
  selectDayBlock(b){this.selectedDayBlockId=this.selectedDayBlockId===b.id?null:b.id;},
  blockStyle(b){const startPct=(b.startHour/24)*100;const widthPct=((b.durationMins/60)/24)*100;return `left:${startPct}%;width:${Math.max(widthPct,2)}%;`;},
  formatBlockTime(b){const sH=String(b.startHour).padStart(2,'0');const endMin=b.startHour*60+b.durationMins;const eH=String(Math.floor(endMin/60)%24).padStart(2,'0');const eM=String(endMin%60).padStart(2,'0');return `${sH}:00 — ${eH}:${eM}`;},
  getBlockIcon(type){return ({'ai-show':'🎙️','music':'🎵','weather':'🌤','voice':'🗣️'})[type]||'📻';},
  nowOffsetPercent(){const n=new Date();return ((n.getHours()*60+n.getMinutes())/(24*60))*100;},
  scrollTimelineToNow(){const wrap=document.getElementById('tl24-wrap');if(!wrap)return;const pct=this.nowOffsetPercent()/100;wrap.scrollLeft=Math.max(0,wrap.scrollWidth*pct - wrap.clientWidth/2);},
  async createPlaylist(){if(!this.active||!this.newPlaylist.name)return;const r=await this.api(`/api/v1/stations/${this.active.id}/playlists`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(this.newPlaylist)});if(r.ok){this.showCreatePlaylist=false;this.newPlaylist={name:'',type:'default',weight:3};this.loadStation(this.active.id);}else this.toast(this.t('error'),r.error,'err');},
  async togglePlaylist(p){const r=await this.api(`/api/v1/stations/${this.active.id}/playlists/${p.id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({is_enabled:!p.is_enabled})});if(r.ok)this.loadStation(this.active.id);else this.toast(this.t('error'),r.error,'err');},
  async deletePlaylist(p){if(!confirm(this.t('cancel')+'?'))return;const r=await this.api(`/api/v1/stations/${this.active.id}/playlists/${p.id}`,{method:'DELETE'});if(r.ok)this.loadStation(this.active.id);else this.toast(this.t('error'),r.error,'err');},
  async bulkAssign(){if(!this.selected.length||!this.bulkPlIds.length)return;const r=await this.api(`/api/v1/stations/${this.active.id}/files/bulk-assign`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({file_ids:this.selected,playlist_ids:this.bulkPlIds})});if(r.ok){this.showBulkAssign=false;this.selected=[];this.bulkPlIds=[];this.loadStation(this.active.id);}else this.toast(this.t('error'),r.error,'err');},
  async uploadFiles(ev){if(!this.active){this.toast(this.t('error'),this.t('select_station_first'),'err');return;}let ok=0,fail=0;for(const f of ev.target.files){const fd=new FormData();fd.append('file',f);fd.append('path',f.name);this.log(`upload ${f.name}`);const r=await fetch(`/api/v1/stations/${this.active.id}/upload`,{method:'POST',body:fd});const j=await r.json();if(j.ok)ok++;else{fail++;this.toast(this.t('upload_failed'),f.name,'err');}}if(ok)this.toast(this.t('upload_ok'),`${ok} ${this.t('files')}`,'ok');this.loadStation(this.active.id);},
  async addSchedule(){
    if(!this.newSchedule.playlist_id)return;
    const toHHMM=(s)=>{const[h,m]=s.split(':').map(Number);return h*100+m;};
    const body={start_time:toHHMM(this.newSchedule.start_str),end_time:toHHMM(this.newSchedule.end_str),days:this.newSchedule.days};
    const r=await this.api(`/api/v1/stations/${this.active.id}/playlists/${this.newSchedule.playlist_id}/schedule`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){this.showAddSchedule=false;this.loadStation(this.active.id);}else this.toast(this.t('error'),r.error,'err');
  },
  async removeScheduleItem(b){
    if(!confirm(this.t('cancel')+'?'))return;
    // We need the playlist's schedule_items index. Simplest: fetch playlist, find matching index, delete.
    const plRes=await this.api(`/api/v1/stations/${this.active.id}/playlists`);
    if(!plRes.ok)return;
    const pl=plRes.data.find(p=>p.id===b.playlist_id);
    if(!pl||!pl.schedule_items)return;
    const idx=pl.schedule_items.findIndex(it=>it.start_time===b.start && it.end_time===b.end);
    if(idx<0)return;
    const r=await this.api(`/api/v1/stations/${this.active.id}/playlists/${b.playlist_id}/schedule/${idx}`,{method:'DELETE'});
    if(r.ok)this.loadStation(this.active.id);
  },
  async createStreamer(){const r=await this.api(`/api/v1/stations/${this.active.id}/streamers`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(this.newStreamer)});if(r.ok){this.showCreateStreamer=false;this.newStreamer={display_name:'',streamer_username:'',streamer_password:'',comments:'',is_active:true};this.loadStation(this.active.id);}else this.toast(this.t('error'),r.error,'err');},
  async deleteStreamer(id){if(!confirm('?'))return;const r=await this.api(`/api/v1/stations/${this.active.id}/streamers/${id}`,{method:'DELETE'});if(r.ok)this.loadStation(this.active.id);},
  async createWebhook(){const body={name:this.newWebhook.name,type:this.newWebhook.type,is_enabled:true,triggers:['song_changed'],config:{webhook_url:this.newWebhook.url}};const r=await this.api(`/api/v1/stations/${this.active.id}/webhooks`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(r.ok){this.showCreateWebhook=false;this.newWebhook={name:'',type:'discord',url:''};this.loadStation(this.active.id);}else this.toast(this.t('error'),r.error,'err');},
  async deleteWebhook(id){if(!confirm('?'))return;const r=await this.api(`/api/v1/stations/${this.active.id}/webhooks/${id}`,{method:'DELETE'});if(r.ok)this.loadStation(this.active.id);},
  async createMount(){const r=await this.api(`/api/v1/stations/${this.active.id}/mounts`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(this.newMount)});if(r.ok){this.showCreateMount=false;this.newMount={name:'/hifi.mp3',autodj_format:'mp3',autodj_bitrate:192};this.loadStation(this.active.id);}else this.toast(this.t('error'),r.error,'err');},
  async deleteMount(id){if(!confirm('?'))return;const r=await this.api(`/api/v1/stations/${this.active.id}/mounts/${id}`,{method:'DELETE'});if(r.ok)this.loadStation(this.active.id);},
  async createPodcast(){const r=await this.api(`/api/v1/stations/${this.active.id}/podcasts`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(this.newPodcast)});if(r.ok){this.showCreatePodcast=false;this.newPodcast={title:'',description:'',author:'',language:'ar'};this.loadStation(this.active.id);}else this.toast(this.t('error'),r.error,'err');},
  async saveBranding(){if(!this.active)return;const r=await this.api(`/api/v1/stations/${this.active.id}/branding`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(this.branding)});if(r.ok)this.toast(this.t('branding_saved'),'','ok');else this.toast(this.t('error'),r.error,'err');},
  openSettings(){if(!this.active)return;this.settings={name:this.active.name,description:this.active.description,timezone:this.active.timezone||'UTC',max_listeners:this.active.max_listeners||0,enable_streamers:!!this.active.enable_streamers,enable_requests:!!this.active.enable_requests,enable_public_page:!!this.active.enable_public_page,enable_on_demand:!!this.active.enable_on_demand};this.showSettings=true;},
  async saveSettings(){if(!this.active)return;const r=await this.api(`/api/v1/stations/${this.active.id}/settings`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(this.settings)});if(r.ok){this.showSettings=false;this.toast(this.t('settings_saved'),'','ok');await this.refresh();}else this.toast(this.t('error'),r.error,'err');},
  async openFolderModal(p){this.folderPlaylist=p;this.newFolderPath='';const r=await this.api(`/api/v1/stations/${this.active.id}/directories`);this.folderRules=r.ok&&Array.isArray(r.data)?r.data:[];this.showFolderModal=true;this.$nextTick(()=>this.tick());},
  async assignFolder(){if(!this.newFolderPath){return;}const r=await this.api(`/api/v1/stations/${this.active.id}/playlists/${this.folderPlaylist.id}/assign-folder`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:this.newFolderPath})});if(r.ok){this.showFolderModal=false;this.toast(this.t('folder_assigned'),`${this.newFolderPath} → ${this.folderPlaylist.name}`,'ok');this.loadStation(this.active.id);}else this.toast(this.t('error'),r.error,'err');},
  async runBackup(){const r=await this.api('/api/v1/backups',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});if(r.ok)this.log('✓ backup queued');else this.toast(this.t('error'),r.error,'err');const list=await this.api('/api/v1/backups');if(list.ok)this.backups=list.data;},
  async buildQueue(){if(!this.active)return;await this.api(`/api/v1/stations/${this.active.id}/build-queue`,{method:'POST'});setTimeout(()=>this.loadQueueHistory(),2000);},
  async skipSong(){if(!this.active)return;await this.api(`/api/v1/stations/${this.active.id}/skip`,{method:'POST'});setTimeout(()=>this.tickLive(),1500);},
  // ---- IDENT STUDIO ----
  openIdent(){
    if(!window.IdentStudio){this.toast(this.t('error'),'IdentStudio not loaded','err');return;}
    this.identPresetKeys = window.IdentStudio.listKeys();
    if(!this.identPreset || !this.identPresetKeys.includes(this.identPreset)) this.identPreset = this.identPresetKeys[0];
    if(!this.identName && this.active) this.identName = this.active.short_name + '-ident';
    this.showIdent = true;
    this.$nextTick(()=>this.tick());
  },
  closeIdent(){window.IdentStudio && window.IdentStudio.stopPreview();this.showIdent=false;},
  identLabel(k){
    const p = window.IdentStudio && window.IdentStudio.presets[k];
    if(!p) return k;
    return this.lang==='ar' ? p.label_ar : p.label_en;
  },
  previewIdent(){
    if(!window.IdentStudio)return;
    const dur = window.IdentStudio.preview(this.identPreset);
    if(dur) this.toast(this.identLabel(this.identPreset), `${dur.toFixed(1)}s`, 'ok');
  },
  async saveIdent(){
    if(!this.active){this.toast(this.t('error'),this.t('select_station_first'),'err');return;}
    if(!window.IdentStudio){this.toast(this.t('error'),'IdentStudio missing','err');return;}
    this.identSaving = true;
    try{
      const blob = window.IdentStudio.toWavBlob(this.identPreset);
      if(!blob){this.toast(this.t('error'),'render failed','err');this.identSaving=false;return;}
      const name = (this.identName || 'ident').replace(/[^a-z0-9-_]+/gi,'_') + '.wav';
      const fd = new FormData();
      fd.append('file', blob, name);
      fd.append('path', 'idents/' + name);
      const r = await fetch(`/api/v1/stations/${this.active.id}/upload`, {method:'POST', body: fd});
      const j = await r.json();
      if(j.ok){
        this.toast(this.t('ident_saved'), name, 'ok');
        this.closeIdent();
        this.loadStation(this.active.id);
      } else {
        this.toast(this.t('error'), j.error || 'upload failed', 'err');
      }
    } finally {
      this.identSaving = false;
    }
  },
  openAI(){this.showAI=true;this.$nextTick(()=>this.tick());},
  async sendAI(presetText){
    const text = (presetText && typeof presetText==='string') ? presetText : this.aiInput.trim();
    if(!text || this.aiBusy)return;
    this.aiInput='';
    this.aiMessages.push({role:'user', content:text});
    this.aiBusy=true;
    this.$nextTick(()=>{const el=document.getElementById('ai-msgs');if(el)el.scrollTop=el.scrollHeight;});
    const ctx = {
      station_id: this.active && this.active.id,
      station_name: this.active && this.active.name,
      tab: this.tab,
      now_playing: this.currentTrack,
      listeners: this.totalListeners,
      playlists: this.playlists.map(p=>({id:p.id, name:p.name, weight:p.weight, enabled:p.is_enabled, songs:p.num_songs})),
      media_count: this.media.length,
      regions_present: [...new Set(this.media.map(m=>m.region))],
    };
    try{
      const r = await fetch('/api/v1/ai/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:this.aiMessages.filter(m=>m.role==='user'||m.role==='assistant').map(m=>({role:m.role,content:m.content})),context:ctx,lang:this.lang})});
      const j = await r.json();
      if(j.ok){
        this.aiMessages.push({role:'assistant', content:j.data.reply || this.t('ai_no_reply')});
        await this.loadStation(this.active.id); // refresh in case tools mutated state
      } else {
        this.aiMessages.push({role:'assistant', content:'⚠ '+(j.error||'AI error')});
      }
    }catch(e){
      this.aiMessages.push({role:'assistant', content:'⚠ '+e.message});
    }
    this.aiBusy=false;
    this.$nextTick(()=>{this.tick();const el=document.getElementById('ai-msgs');if(el)el.scrollTop=el.scrollHeight;});
  },
};
}
</script>
